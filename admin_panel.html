<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>
    <link rel="stylesheet" href="admin_panel.css" />
</head>
<body>
    <div class="container">
        <h1>Admin Panel</h1>
        <form class="admin-form" action="#" method="post">
            <div class="form-group">
                <label for="notice-title">Notice Title</label>
                <input type="text" id="notice-title" name="title" placeholder="Enter notice title" required />
            </div>
            <div class="form-group">
                <label for="notice-desc">Description</label>
                <textarea id="notice-desc" name="description" placeholder="Enter description" required></textarea>
            </div>
            <div class="form-group">
                <label for="notice-type">Type</label>
                <select id="notice-type" name="type" required>
                    <option value="" disabled selected>Select type</option>
                    <option value="important">Important</option>
                    <option value="info">Info</option>
                    <option value="finance">Finance</option>
                </select>
            </div>
            <button type="submit" class="submit-btn">Create Notice</button>
        </form>
    </div>
</body>
</html>
